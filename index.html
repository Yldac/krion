<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Управление установкой</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a1e24;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: #0f1217;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            overflow: hidden;
            padding: 20px 16px 30px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-change-id {
            background: #2c313a;
            border: none;
            color: white;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-change-id:active {
            background: #3e4550;
            transform: scale(0.96);
        }

        .info-panel {
            background: #1e242c;
            border-radius: 10px;
            padding: 16px 20px 20px;
            margin-bottom: 24px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .address-line {
            font-size: 16px;
            font-weight: 600;
            color: #8ab4f8;
            border-bottom: 1px solid #2f3a46;
            padding-bottom: 8px;
            margin-bottom: 12px;
            text-align: center;
            word-break: break-word;
        }

        .message-area {
            flex: 1;
            min-height: 90px;
            font-size: 18px;
            line-height: 1.4;
            color: #eef2ff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            word-break: break-word;
        }

        .temp-area {
            border-top: 1px solid #2f3a46;
            padding-top: 12px;
            margin-top: 8px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: #ffffff;
        }

        .temp-label {
            font-size: 14px;
            font-weight: normal;
            color: #9aa9b9;
            margin-right: 6px;
        }

        .temp-value {
            font-family: monospace;
            font-size: 26px;
            font-weight: 700;
        }

        .temp-negative {
            color: #6c8ebf;
        }

        .temp-positive {
            color: #ffb86c;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .ctrl-btn {
            background: #2c313a;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .ctrl-btn:active {
            background: #3e4550;
            transform: scale(0.97);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e242c;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            padding: 24px 20px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: white;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #0f1217;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }

        .modal-content button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .status-badge {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #7e8c9e;
        }

        .footer-note {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #4a5562;
        }

        @media (max-width: 480px) {
            .buttons-grid {
                gap: 6px;
            }
            .ctrl-btn {
                font-size: 11px;
                padding: 10px 0;
            }
            .temp-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="btn-change-id" id="changeIdBtn">Сменить ID</button>
    </div>

    <div class="info-panel">
        <div class="address-line" id="addressDisplay">— Адрес не задан —</div>
        <div class="message-area" id="messageDisplay">Ожидание сообщений...</div>
        <div class="temp-area">
            <span class="temp-label">🌡️ Температура</span>
            <span class="temp-value" id="tempValue">--.-</span>
            <span>°C</span>
        </div>
    </div>

    <div class="buttons-grid">
        <button class="ctrl-btn" data-cmd="status">Статус</button>
        <button class="ctrl-btn" data-cmd="on">Включить</button>
        <button class="ctrl-btn" data-cmd="off">Выключить</button>
        <button class="ctrl-btn" data-cmd="dry_start">Начать сушку</button>
        <button class="ctrl-btn" data-cmd="dry_stop">Завершить сушку</button>
    </div>
    <div class="status-badge" id="mqttStatus">🔌 Подключение...</div>
    <div class="footer-note">Защищённое подключение (WSS)</div>
</div>

<!-- Модалка ввода ID -->
<div id="idModal" class="modal">
    <div class="modal-content">
        <h3>Введите ваш ID</h3>
        <input type="text" id="clientIdInput" placeholder="Например: Ваш ID_N" autocomplete="off">
        <button id="saveIdBtn">Сохранить</button>
    </div>
</div>

<script>
    // ==============================================================
    //  ⚙️ НАСТРОЙКИ (МЕНЯЙ ЗДЕСЬ ВРУЧНУЮ)
    // ==============================================================
    
    // База данных: ID клиента -> { адрес, топики }
    // Добавляй или меняй записи здесь
    const CLIENT_DATABASE = {
        // Пример 1
        "Svetlana_N": {
            address: "Нейшлотский переулок 21",
            topics: {
                read: "ReadN",
                post: "PostN",
                temp: "TempN"
            }
        },
        "Liza_N": {
            address: "Нейшлотский переулок 21",
            topics: {
                read: "ReadN",
                post: "PostN",
                temp: "TempN"
            }
        },
        "Elena_N": {
            address: "Нейшлотский переулок 21",
            topics: {
                read: "ReadN",
                post: "PostN",
                temp: "TempN"
            }
        },
        "Anna_N": {
            address: "Нейшлотский переулок 21",
            topics: {
                read: "ReadN",
                post: "PostN",
                temp: "TempN"
            }
        },
        // Пример 2
        "Svenlana_L": {
            address: "ул. Лермонтова 15",
            topics: {
                read: "Read",
                post: "Post",
                temp: "Temp"
            }
        },
        "Oksana_L": {
            address: "ул. Лермонтова 15",
            topics: {
                read: "Read",
                post: "Post",
                temp: "Temp"
            }
        },
        "Svenlana_C": {
            address: "ул. Чистякова 77",
            topics: {
                read: "ReadС",
                post: "PostС",
                temp: "TempС"
            }
        },
        "Oksana_C": {
            address: "ул. Чистякова 77",
            topics: {
                read: "ReadС",
                post: "PostС",
                temp: "TempС"
            }
        }
        // ==========================================================
        // 🔧 ДОБАВЛЯЙ НОВЫХ КЛИЕНТОВ ЗДЕСЬ:
        // ==========================================================
        // "Новый_ID": {
        //     address: "Новый адрес",
        //     topics: {
        //         read: "Свой_топик_Read",
        //         post: "Свой_топик_Post", 
        //         temp: "Свой_топик_Temp"
        //     }
        // }
    };
    
    // ==============================================================
    //  КОНЕЦ НАСТРОЕК (ДАЛЬШЕ НИЧЕГО НЕ МЕНЯТЬ)
    // ==============================================================
    
    let mqttClient = null;
    let currentClientId = null;
    let currentAddress = null;
    let currentTopics = null;
    let isConnecting = false;
    let reconnectTimer = null;
    
    const addressDisplay = document.getElementById("addressDisplay");
    const messageDisplay = document.getElementById("messageDisplay");
    const tempValueSpan = document.getElementById("tempValue");
    const mqttStatusSpan = document.getElementById("mqttStatus");
    const clientIdInput = document.getElementById("clientIdInput");
    const saveIdBtn = document.getElementById("saveIdBtn");
    const changeIdBtn = document.getElementById("changeIdBtn");
    
    // --------------------------------------------------------------
    //  ФУНКЦИИ РАБОТЫ С БАЗОЙ
    // --------------------------------------------------------------
    function getClientData(clientId) {
        return CLIENT_DATABASE[clientId] || null;
    }
    
    function getAddressById(clientId) {
        const data = getClientData(clientId);
        return data ? data.address : "❌ Адрес не найден";
    }
    
    function getTopicsById(clientId) {
        const data = getClientData(clientId);
        return data ? { ...data.topics } : null;
    }
    
    function updateDisplay() {
        if (currentClientId) {
            currentAddress = getAddressById(currentClientId);
            currentTopics = getTopicsById(currentClientId);
            addressDisplay.innerText = currentAddress;
        } else {
            addressDisplay.innerText = "— Адрес не задан —";
            currentTopics = null;
        }
    }
    
    // --------------------------------------------------------------
    //  MQTT
    // --------------------------------------------------------------
    function disconnectMqtt() {
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
        if (mqttClient) {
            if (mqttClient.isConnected()) {
                try {
                    mqttClient.disconnect();
                } catch(e) {}
            }
            mqttClient = null;
        }
        isConnecting = false;
    }
    
    function formatTemperature(value) {
        if (value === null || value === undefined || value === "") return "--.-";
        const match = String(value).match(/(-?\d+(?:\.\d+)?)/);
        if (!match) return String(value);
        let num = parseFloat(match[1]);
        if (isNaN(num)) return String(value);
        const formatted = num.toFixed(1);
        if (num > 0) return `+${formatted}`;
        else if (num < 0) return `${formatted}`;
        else return `+0.0`;
    }
    
    function onMessageArrived(message) {
        const topic = message.destinationName;
        const payload = message.payloadString;
        console.log(`[MQTT] ${topic} -> ${payload}`);
        
        if (!currentTopics) return;
        
        if (topic === currentTopics.post) {
            messageDisplay.innerText = payload || "(пустое сообщение)";
        } 
        else if (topic === currentTopics.temp) {
            const formatted = formatTemperature(payload);
            tempValueSpan.innerText = formatted;
            tempValueSpan.className = formatted.startsWith("-") ? "temp-value temp-negative" : "temp-value temp-positive";
        }
    }
    
    function onConnect() {
        console.log("MQTT подключен");
        isConnecting = false;
        mqttStatusSpan.innerText = "✅ Онлайн";
        
        if (mqttClient && mqttClient.isConnected() && currentTopics) {
            try {
                mqttClient.subscribe(currentTopics.post);
                mqttClient.subscribe(currentTopics.temp);
                console.log(`Подписка: ${currentTopics.post}, ${currentTopics.temp}`);
                setTimeout(() => publishCommand("$3#"), 500);
            } catch(e) { console.error("Subscribe error:", e); }
        }
    }
    
    function onConnectionLost(response) {
        console.log("Соединение потеряно");
        mqttStatusSpan.innerText = "❌ Соединение потеряно";
        isConnecting = false;
        
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => {
            if (currentTopics) {
                console.log("Переподключение...");
                initMqtt();
            }
        }, 5000);
    }
    
    function initMqtt() {
        if (!currentTopics) {
            mqttStatusSpan.innerText = "⚠️ Выберите ID";
            return;
        }
        
        if (isConnecting) return;
        if (mqttClient && mqttClient.isConnected()) return;
        
        disconnectMqtt();
        isConnecting = true;
        mqttStatusSpan.innerText = "🔌 Подключение...";
        
        const clientId = "web_" + Math.random().toString(36).substr(2, 8);
        mqttClient = new Paho.MQTT.Client("m4.wqtt.ru", 15415, "/mqtt", clientId);
        mqttClient.onConnectionLost = onConnectionLost;
        mqttClient.onMessageArrived = onMessageArrived;
        
        const options = {
            onSuccess: onConnect,
            onFailure: (err) => {
                console.error("Ошибка подключения", err);
                isConnecting = false;
                mqttStatusSpan.innerText = "🔴 Ошибка подключения";
                reconnectTimer = setTimeout(() => {
                    if (currentTopics) initMqtt();
                }, 10000);
            },
            userName: "u_raTefa",
            password: "0B2Gp4iF",
            useSSL: true,
            keepAliveInterval: 60,
            mqttVersion: 4
        };
        
        mqttClient.connect(options);
    }
    
    function publishCommand(payload) {
        if (!mqttClient || !mqttClient.isConnected()) {
            mqttStatusSpan.innerText = "⚠️ Нет соединения";
            return false;
        }
        if (!currentTopics) return false;
        
        const message = new Paho.MQTT.Message(payload);
        message.destinationName = currentTopics.read;
        mqttClient.send(message);
        console.log(`Отправлено в ${currentTopics.read}: ${payload}`);
        return true;
    }
    
    // --------------------------------------------------------------
    //  ID КЛИЕНТА
    // --------------------------------------------------------------
    function setClientId(id) {
        if (!id || id.trim() === "") return false;
        
        const newId = id.trim();
        const data = getClientData(newId);
        
        if (!data) {
            const availableIds = Object.keys(CLIENT_DATABASE).join(", ");
            alert(`❌ ID "${newId}" не найден!\n\nПопробуйте другой ID`);
            return false;
        }
        
        const needReconnect = (currentClientId !== newId);
        currentClientId = newId;
        localStorage.setItem("app_client_id", currentClientId);
        updateDisplay();
        
        if (needReconnect) {
            messageDisplay.innerText = `✅ ID: ${currentClientId}`;
            tempValueSpan.innerText = "--.-";
            tempValueSpan.className = "temp-value";
            initMqtt();
        }
        
        return true;
    }
    
    function loadStoredId() {
        const stored = localStorage.getItem("app_client_id");
        if (stored && getClientData(stored)) {
            setClientId(stored);
            return true;
        }
        return false;
    }
    
    function showIdModal() {
        clientIdInput.value = currentClientId || "";
        document.getElementById("idModal").style.display = "flex";
    }
    
    function hideIdModal() {
        document.getElementById("idModal").style.display = "none";
    }
    
    // --------------------------------------------------------------
    //  КНОПКИ
    // --------------------------------------------------------------
    function handleCommand(cmdType) {
        const payloads = {
            status: "$3#", on: "$1#", off: "$11#",
            dry_start: "$2#", dry_stop: "$22#"
        };
        publishCommand(payloads[cmdType]);
    }
    
    function bindButtons() {
        document.querySelectorAll(".ctrl-btn").forEach(btn => {
            btn.onclick = () => handleCommand(btn.dataset.cmd);
        });
    }
    
    // --------------------------------------------------------------
    //  ИНИЦИАЛИЗАЦИЯ
    // --------------------------------------------------------------
    function setupEventListeners() {
        changeIdBtn.onclick = showIdModal;
        saveIdBtn.onclick = () => {
            const newId = clientIdInput.value.trim();
            if (newId && setClientId(newId)) {
                hideIdModal();
            } else if (!newId) {
                alert("Введите ID");
            }
        };
        document.getElementById("idModal").onclick = (e) => {
            if (e.target === document.getElementById("idModal")) hideIdModal();
        };
    }
    
    function startApp() {
        bindButtons();
        setupEventListeners();
        
        if (!loadStoredId()) {
            showIdModal();
        } else {
            messageDisplay.innerText = "Готов к работе";
            if (currentTopics) initMqtt();
        }
    }
    
    startApp();
</script>
</body>
</html>
